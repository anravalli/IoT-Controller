<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IoT Control Panel</title>
    <style>
        .status { padding: 10px; margin: 10px; border-radius: 5px; }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Comando e Controllo Device</h1>

    <div id="connectionStatus" class="status offline">Stato: Disconnesso</div>
    <div id="deviceState">Stato Dispositivo: Sconosciuto...</div>

    <button onclick="sendRestCommand('on')">Accendi</button>
    <button onclick="sendRestCommand('off')">Spegni</button>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://192.168.1.12:8000/api'
            : '/api';
        const WS_URL =  window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? "ws://192.168.1.12:8000/ws"
            : "wss://iot-controller-cxcbcrgqgse5dfc0.italynorth-01.azurewebsites.net/ws"
        let socket;

        function connect() {
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                document.getElementById('connectionStatus').innerText = "Stato: Connesso";
                document.getElementById('connectionStatus').className = "status online";
                console.log("Connessione WebSocket stabilita.");
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log("Messaggio dal server:", data);
                // Aggiorna la UI con lo stato ricevuto dal device via MQTT
                document.getElementById('deviceState').innerText = `Stato Dispositivo: ${data.state}`;
            };

            socket.onclose = () => {
                document.getElementById('connectionStatus').innerText = "Stato: Disconnesso (Riconnessione...)";
                document.getElementById('connectionStatus').className = "status offline";
                setTimeout(connect, 3000); // Tentativo di riconnessione automatica
            };

            socket.onerror = (error) => {
                console.error("Errore WebSocket:", error);
            };
        }
        //send command via WebSocket: UNUSED
        function sendCommand(action) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ "command": action }));
            }
        }

        function sendRestCommand(action) {
            console.log("sendRestCommand:", action);
            body_str = JSON.stringify({ command: action })
            console.log("command:", body_str);
            fetch(API_BASE_URL + '/command', {
                headers: {
                    "Content-Type": "application/json", // FONDAMENTALE
                },
                method: 'PUT',
                body: body_str
            });
        }

        // Avvia la connessione
        connect();
    </script>
</body>
</html>
